<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa 2</title>
</head>
<body>
    <script>
// Suma
let s1 = 15, s2 = 25;
console.log("Suma: " + (s1 + s2));

// Resta
let r1 = 100, r2 = 37;
console.log("Resta: " + (r1 - r2));

// Multiplicación
let m1 = 8, m2 = 7;
console.log("Multiplicación: " + (m1 * m2));

// División
let d1 = 50, d2 = 4;
console.log("División: " + (d1 / d2));

// Módulo (Residuo de la división)
let mod1 = 10, mod2 = 3;
console.log("Módulo: " + (mod1 % mod2));
    </script>
</body>
</html>
