<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>¿10 es mayor que 5? 
    <script>if(10 > 5) document.write("Sí");</script>
  </p>

  <p>¿20 es igual a 40? 
    <script>if(20 == 40) { document.write("Sí"); } else { document.write("No"); }</script>
  </p>

  <p>¿8 es menor que 15? 
    <script>if(8 < 15) document.write("Cierto");</script>
  </p>

  <p>¿100 es diferente de 100? 
    <script>if(100 != 100) { document.write("Sí"); } else { document.write("No"); }</script>
  </p>
</body>
</html>
